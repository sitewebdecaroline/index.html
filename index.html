</head>

<body>

    <h1>Compteur de clics</h1>

    <h2 id="count">0</h2>

    <button onclick="augmenter()">
        +1
    </button>

    <button onclick="reset()">
        Reset
    </button>

    <button onclick="diminuer()">
        -1
    </button> 
    <script>
        let compteur = 0;

        function augmenter() {
            compteur = compteur + 1;
            document.getElementById("count").innerText = compteur;
        }

        function reset() {
            compteur = 0;
            document.getElementById("count").innerText = compteur;
        }
       function diminuer() { compteur = compteur - 1;
        document.getElementById("count").innerText=compteur;
         }

         
    </script>
